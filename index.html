            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;

            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-sizing: border-box;
            margin-top: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        .subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        .mode-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #34495e;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #3498db;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-sizing: border-box;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-secondary {
            background-color: #e67e22;
        }
        .question-box {
            font-size: 18px;
            font-weight: bold;
            line-height: 1.5;
            margin: 20px 0;
            text-align: left;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 5px solid #3498db;
            border-radius: 4px;
        }
        .answer-area {
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            min-height: 80px;
            margin: 15px 0;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-content: flex-start;
            background-color: #fff;
        }
        .word-pool {
            border: 2px solid #3498db;
            border-radius: 8px;
            min-height: 80px;
            margin: 15px 0;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-content: flex-start;
            background-color: #fff;
        }
        .word {
            background-color: #ecf0f1;
            border: 1px solid #bdc3c7;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }
        .word:active {
            background-color: #d6dbdf;
        }

        .answer-area .word:first-child::first-letter {
            text-transform: uppercase;
        }

        .control-btns {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-control {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: #fff;

            background-color: #95a5a6;
        }
        .btn-submit {
            background-color: #2ecc71;
        }

            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 10px;
            text-align: right;

            color: #7f8c8d;
            text-align: left;
            margin-bottom: 2px;

        }

            font-size: 48px;
            font-weight: bold;
            color: #2ecc71;
            margin: 20px 0;

            { category: "受け身 不規則動詞 3", japanese: "その長い木は明日、切られる予定です。", correct: ["The tall tree", "will be", "cut", "tomorrow", "."] },

            { category: "受け身 不規則動詞 3", japanese: "このレポートは次の金曜日までに書かれなければいけません。", correct: ["This report", "must be", "written", "by", "next Friday", "."] }
        ];

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedWords = [];
        let poolWords = [];
        let reviewData = [];
        let currentMode = "";

       // 固有名詞と特定単語のチェック用関数（不具合修正版）
function isProperNoun(word) {
    // 1. 先頭が元々大文字の単語、または単独の "I" は一発で固有名詞と判定
    if (word === "I" || (word.length > 0 && word[0] === word[0].toUpperCase() && /^[A-Z]/.test(word))) {
        return true;
    }
    // 2. "Ken's birthday party" のように、塊の途中に大文字が含まれる場合も判定
    if (/[A-Z]/.test(word)) {
        return true;
    }
    return false;
}
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz(mode) {
            currentMode = mode;
            reviewData = [];
            
            if (mode === 'ミックス') {
                currentQuestions = [...quizData];
            } else {
                currentQuestions = quizData.filter(q => q.category === mode);
            }

            shuffleArray(currentQuestions);
            if (currentQuestions.length > 10) {
                currentQuestions = currentQuestions.slice(0, 10);
            }

            if (currentQuestions.length === 0) {
                alert("該当する問題が見つかりませんでした。");
                return;
            }

            currentQuestionIndex = 0;
            score = 0;

            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            
            document.getElementById('current-mode-title').innerText = mode;

            loadQuestion();
        }

        function loadQuestion() {
            selectedWords = [];
            const currentQ = currentQuestions[currentQuestionIndex];
            
            document.getElementById('status-text').innerText = `問題: ${currentQuestionIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('japanese-text').innerText = (currentMode === 'ミックス') ? `[${currentQ.category}] ${currentQ.japanese}` : currentQ.japanese;

            poolWords = [...currentQ.correct];
            shuffleArray(poolWords);

            renderZones();
        }

        function renderZones() {
            // 1. 解答エリアの描画
            const answerZone = document.getElementById('answer-zone');
            answerZone.innerHTML = '';
            selectedWords.forEach((word, index) => {
                const wordBtn = document.createElement('span');
                wordBtn.className = 'word';
                
                // 表示上はプール内と同じルールを適用（CSSの魔法で先頭だけ大文字化するため、データは小文字ベースにしておく）
                if (!isProperNoun(word)) {
                    wordBtn.innerText = word.charAt(0).toLowerCase() + word.slice(1);
                } else {
                    wordBtn.innerText = word;
                }
                
                wordBtn.onclick = () => removeWord(index);
                answerZone.appendChild(wordBtn);
            });

            // 2. 選択肢プールの描画
            const wordZone = document.getElementById('word-zone');
            wordZone.innerHTML = '';
            poolWords.forEach((word, index) => {
                const wordBtn = document.createElement('span');
                wordBtn.className = 'word';
                
                // 固有名詞や「I」以外はすべて小文字スタートでプールに並べる
                if (!isProperNoun(word)) {
                    wordBtn.innerText = word.charAt(0).toLowerCase() + word.slice(1);
                } else {
                    wordBtn.innerText = word;
                }

                wordBtn.onclick = () => pickWord(index);
                wordZone.appendChild(wordBtn);
            });
        }

        function pickWord(index) {
            selectedWords.push(poolWords[index]);
            poolWords.splice(index, 1);
            renderZones();
        }

        function removeWord(index) {
            poolWords.push(selectedWords[index]);
            selectedWords.splice(index, 1);
            renderZones();
        }

        function resetCurrentQuestion() {
            loadQuestion();
        }

        function submitAnswer() {
            const currentQ = currentQuestions[currentQuestionIndex];
            const userAnsStr = selectedWords.join(' ');
            const correctAnsStr = currentQ.correct.join(' ');

            const isCorrect = (userAnsStr === correctAnsStr);
            if (isCorrect) score++;

            reviewData.push({
                japanese: currentQ.japanese,
                correct: correctAnsStr,
                user: userAnsStr || "(空欄)",
                correctFlag: isCorrect
            });

            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';

            document.getElementById('score-display').innerText = `${score} / ${currentQuestions.length}`;
            
            const comment = document.getElementById('result-comment');
            const percent = (score / currentQuestions.length) * 100;
            if (percent === 100) comment.innerText = "素晴らしい！満点です！";
            else if (percent >= 80) comment.innerText = "お見事！あともう少しです！👍";
            else if (percent >= 50) comment.innerText = "ナイスファイト！復習してもう一度挑戦しよう！";
            else comment.innerText = "一歩ずつ進みましょう！次はもっと取れるはずです！";

            const reviewZone = document.getElementById('review-zone');
            reviewZone.innerHTML = '';
            reviewData.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'review-item';
                div.innerHTML = `
                    <div class="review-q">${idx + 1}. ${item.japanese} ${item.correctFlag ? '✅' : '❌'}</div>
                    <div class="review-a">正解: ${item.correct}</div>
                    ${!item.correctFlag ? `<div class="review-w">解答: ${item.user}</div>` : ''}
                `;
                reviewZone.appendChild(div);
            });
        }

        function backToMenu() {
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
        }
